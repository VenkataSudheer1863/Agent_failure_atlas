# Agent Failure Atlas — Benchmark Configuration
# Used by run_benchmark.py

benchmark:
  name: "AFA Benchmark v1.0"
  version: "1.0.0"
  description: "Cross-model evaluation of agent failure modes"

# Models to evaluate
# Comment out any model you do not have available locally
models:
  - name: "GPT-OSS-20B"
    enabled: false   # Requires vLLM server; set true if running
  - name: "Qwen3-8B"
    enabled: true
  - name: "Qwen3-30B"
    enabled: true
  - name: "DeepSeek-R1-8B"
    enabled: true
  - name: "Gemma3-12B"
    enabled: true
  - name: "Llama-3.2"
    enabled: true

# Task types to include
task_types:
  - information_seeking
  - tool_use
  - planning
  - reasoning
  - multi_agent

# Paths
tasks_dir: "experiments/tasks"
output_dir: "experiments/results/raw"

# Evaluation settings
evaluation:
  temperature: 0.0       # Use 0 for deterministic; increase for variance estimation
  max_steps: 8           # Maximum agentic loop steps per task
  seed: 42
  n_runs: 1              # Increase for variance estimation; 1 = single run per task/model

# Judge model for auto-labeling (used by evaluate.py --judge)
judge:
  model: "qwen3:8b"
  temperature: 0.0
  max_tokens: 512

# Metrics to compute
metrics:
  - failure_rate
  - recovery_rate
  - mean_severity
  - category_frequency
  - failure_density
  - per_task_type_failure_rate
