# Llama 3.2 Local Model Configuration
# Run via Ollama: ollama pull llama3.2

model_name: "Llama-3.2"
paper_name: "Meta Llama 3.2 3B Instruct"
ollama_model: "llama3.2"
backend: "ollama"
base_url: "http://localhost:11434"

# Generation settings
temperature: 0.0
max_tokens: 2048
seed: 42
timeout_seconds: 120

# Hardware requirements
min_vram_gb: 3
min_ram_gb: 4
disk_space_gb: 2.0

# Source
hf_repo: "meta-llama/Llama-3.2-3B-Instruct"
hf_url: "https://huggingface.co/meta-llama/Llama-3.2-3B-Instruct"
ollama_url: "https://ollama.com/library/llama3.2"

# Notes
notes: >
  Llama 3.2 3B is Meta's compact instruction-tuned model.
  Suitable for CPU-only machines with limited VRAM.
  For larger variant: llama3.2:11b (requires more memory).
  License: Llama 3.2 Community License (commercial use allowed).
